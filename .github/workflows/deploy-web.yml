name: Build & Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary + export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot ~/.local/share/godot/export_templates
          curl -fsSL "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d ~/godot
          mv ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot/godot
          chmod +x ~/godot/godot
          curl -fsSL "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -o /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q -j /tmp/templates.tpz -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Pre-import resources
        run: |
          ~/godot/godot --headless --path . --import || true

      - name: Export Web build
        run: |
          mkdir -p build/web
          ~/godot/godot --headless --path . --export-release "Web" build/web/index.html

      - name: Inject Safari/iOS head polish
        run: |
          python3 - build/web/index.html html/safari-head-include.html <<'PY'
          import sys, pathlib
          idx = pathlib.Path(sys.argv[1])
          head = pathlib.Path(sys.argv[2]).read_text()
          html = idx.read_text()
          if "<!-- Safari / iOS PWA polish -->" not in html:
              html = html.replace("<head>", "<head>\n" + head, 1)
              idx.write_text(html)
          PY

      - name: Unregister legacy COI service worker
        run: |
          # The Web preset has thread_support=false, so we don't need COOP/COEP
          # or a service worker. But returning visitors still have the previous
          # COI SW registered, which can put the page into a reload loop. Ship
          # a tiny self-unregistering SW at the same path so old clients clean
          # themselves up on the next visit.
          cat > build/web/coi-serviceworker.js <<'EOF'
          /* Self-unregister: previous deploys injected a COI SW here. */
          (() => {
            if (typeof window === "undefined") {
              self.addEventListener("install", () => self.skipWaiting());
              self.addEventListener("activate", (e) => {
                e.waitUntil((async () => {
                  await self.registration.unregister();
                  const clients = await self.clients.matchAll();
                  clients.forEach((c) => c.navigate(c.url));
                })());
              });
              return;
            }
            // On the page side: if a SW controls us, let it self-unregister.
            // Don't reload from here — the SW's clients.navigate handles it.
          })();
          EOF
          # Disable Jekyll so files starting with `_` are served.
          touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
