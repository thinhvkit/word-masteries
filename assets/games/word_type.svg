<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <!-- Path-traced "Aa" wordmark. SVG <text> was invisible because Godot's
       SVG importer doesn't ship system fonts; using strokes/fills only. -->

  <!-- Uppercase A -->
  <path d="M 4 48 L 17 10 L 30 48" stroke="#ffffff" stroke-width="4.5"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="9.5" y1="34" x2="24.5" y2="34" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

  <!-- Lowercase a — circular bowl + right-side stem -->
  <circle cx="45" cy="38" r="9" stroke="#ffffff" stroke-width="4" fill="none"/>
  <line x1="54" y1="28" x2="54" y2="48" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
</svg>
