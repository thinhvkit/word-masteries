<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Spelluga — magical turtle with a spellbook shell. -->
  <!-- Back feet -->
  <ellipse cx="22" cy="92" rx="9" ry="6" fill="#7fc59a"/>
  <ellipse cx="98" cy="92" rx="9" ry="6" fill="#7fc59a"/>
  <!-- Tail -->
  <path d="M16,78 L8,82 L14,72 Z" fill="#7fc59a"/>
  <!-- Shell (dome) -->
  <ellipse cx="60" cy="62" rx="44" ry="32" fill="#b88adf"/>
  <!-- Shell highlight -->
  <ellipse cx="48" cy="48" rx="20" ry="12" fill="#d8b8f0" opacity="0.6"/>
  <!-- Shell hex panels (arcane runes feel) -->
  <polygon points="60,42 70,48 70,60 60,66 50,60 50,48" fill="#8c5cb8" opacity="0.85"/>
  <polygon points="36,52 44,57 44,67 36,72 28,67 28,57" fill="#8c5cb8" opacity="0.7"/>
  <polygon points="84,52 92,57 92,67 84,72 76,67 76,57" fill="#8c5cb8" opacity="0.7"/>
  <!-- Star runes on hex -->
  <path d="M60,48 L62,54 L68,54 L63,57 L65,63 L60,60 L55,63 L57,57 L52,54 L58,54 Z" fill="#ffd95f"/>
  <circle cx="36" cy="62" r="2.4" fill="#ffd95f"/>
  <circle cx="84" cy="62" r="2.4" fill="#ffd95f"/>
  <!-- Shell rim -->
  <path d="M16,72 Q60,98 104,72" stroke="#6c4a98" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="60" cy="92" rx="18" ry="14" fill="#7fc59a"/>
  <!-- Head highlight -->
  <ellipse cx="56" cy="89" rx="8" ry="4" fill="#a3d9b9" opacity="0.8"/>
  <!-- Tiny wizard hat tip (magic accent) -->
  <path d="M60,30 L66,18 L72,30 Z" fill="#5a2b8a"/>
  <circle cx="66" cy="16" r="2.6" fill="#ffd95f"/>
  <!-- Eyes -->
  <circle cx="53" cy="91" r="3.6" fill="#ffffff"/>
  <circle cx="67" cy="91" r="3.6" fill="#ffffff"/>
  <circle cx="53" cy="92" r="2" fill="#1a1a2e"/>
  <circle cx="67" cy="92" r="2" fill="#1a1a2e"/>
  <!-- Mouth (slight smirk) -->
  <path d="M55,99 Q60,103 65,99" stroke="#3a5a4a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Sparkles -->
  <circle cx="18" cy="40" r="2" fill="#ffd95f"/>
  <circle cx="102" cy="40" r="2" fill="#ffd95f"/>
  <circle cx="14" cy="60" r="1.4" fill="#ffd95f"/>
  <circle cx="106" cy="60" r="1.4" fill="#ffd95f"/>
</svg>
