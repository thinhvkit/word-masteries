<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="bf_upper" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffc1d5"/>
      <stop offset="100%" stop-color="#b88adf"/>
    </radialGradient>
    <radialGradient id="bf_lower" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffd8a8"/>
      <stop offset="100%" stop-color="#ff8844"/>
    </radialGradient>
  </defs>
  <!-- Upper wings -->
  <ellipse cx="36" cy="42" rx="26" ry="22" fill="url(#bf_upper)"/>
  <ellipse cx="84" cy="42" rx="26" ry="22" fill="url(#bf_upper)"/>
  <!-- Lower wings -->
  <ellipse cx="40" cy="78" rx="20" ry="18" fill="url(#bf_lower)"/>
  <ellipse cx="80" cy="78" rx="20" ry="18" fill="url(#bf_lower)"/>
  <!-- Wing spots -->
  <circle cx="32" cy="42" r="4" fill="#ffffff" opacity="0.85"/>
  <circle cx="88" cy="42" r="4" fill="#ffffff" opacity="0.85"/>
  <circle cx="40" cy="78" r="3" fill="#ffffff" opacity="0.7"/>
  <circle cx="80" cy="78" r="3" fill="#ffffff" opacity="0.7"/>
  <!-- Body -->
  <ellipse cx="60" cy="60" rx="5" ry="32" fill="#3a2052"/>
  <!-- Antennae -->
  <path d="M58,30 Q52,18 50,14 M62,30 Q68,18 70,14" stroke="#3a2052" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="50" cy="14" r="2" fill="#3a2052"/>
  <circle cx="70" cy="14" r="2" fill="#3a2052"/>
  <!-- Face -->
  <circle cx="56" cy="44" r="1.8" fill="#ffffff"/>
  <circle cx="64" cy="44" r="1.8" fill="#ffffff"/>
</svg>
