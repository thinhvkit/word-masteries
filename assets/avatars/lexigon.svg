<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Lexigon — final-boss dragon. Crimson scales, gold horns. -->
  <!-- Wings (behind head) -->
  <path d="M14,52 Q4,30 22,28 Q24,42 36,50 Z" fill="#8c1f2c"/>
  <path d="M106,52 Q116,30 98,28 Q96,42 84,50 Z" fill="#8c1f2c"/>
  <path d="M14,52 Q10,42 22,40" stroke="#5a0e18" stroke-width="1.5" fill="none"/>
  <path d="M106,52 Q110,42 98,40" stroke="#5a0e18" stroke-width="1.5" fill="none"/>
  <!-- Horns -->
  <path d="M34,30 L28,8 L44,22 Z" fill="#ffd95f"/>
  <path d="M86,30 L92,8 L76,22 Z" fill="#ffd95f"/>
  <path d="M34,30 L32,18 L40,24 Z" fill="#dba830"/>
  <path d="M86,30 L88,18 L80,24 Z" fill="#dba830"/>
  <!-- Head -->
  <ellipse cx="60" cy="60" rx="40" ry="38" fill="#e0394a"/>
  <!-- Snout (lower) -->
  <ellipse cx="60" cy="78" rx="22" ry="14" fill="#e0394a"/>
  <!-- Belly/jaw lighter highlight -->
  <ellipse cx="60" cy="82" rx="18" ry="9" fill="#f06474" opacity="0.85"/>
  <!-- Scale flecks -->
  <circle cx="34" cy="48" r="2.6" fill="#8c1f2c" opacity="0.7"/>
  <circle cx="44" cy="36" r="2" fill="#8c1f2c" opacity="0.7"/>
  <circle cx="86" cy="48" r="2.6" fill="#8c1f2c" opacity="0.7"/>
  <circle cx="76" cy="36" r="2" fill="#8c1f2c" opacity="0.7"/>
  <circle cx="28" cy="62" r="2" fill="#8c1f2c" opacity="0.6"/>
  <circle cx="92" cy="62" r="2" fill="#8c1f2c" opacity="0.6"/>
  <!-- Brow ridges (menacing but cute) -->
  <path d="M38,50 L52,46" stroke="#5a0e18" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M82,50 L68,46" stroke="#5a0e18" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="48" cy="58" rx="6.5" ry="8" fill="#ffd95f"/>
  <ellipse cx="72" cy="58" rx="6.5" ry="8" fill="#ffd95f"/>
  <ellipse cx="48" cy="60" rx="2.2" ry="6" fill="#1a1a2e"/>
  <ellipse cx="72" cy="60" rx="2.2" ry="6" fill="#1a1a2e"/>
  <circle cx="49.5" cy="56" r="1.4" fill="#ffffff"/>
  <circle cx="73.5" cy="56" r="1.4" fill="#ffffff"/>
  <!-- Nostrils with smoke -->
  <ellipse cx="54" cy="76" rx="1.8" ry="2.4" fill="#5a0e18"/>
  <ellipse cx="66" cy="76" rx="1.8" ry="2.4" fill="#5a0e18"/>
  <circle cx="54" cy="68" r="2" fill="#ffffff" opacity="0.55"/>
  <circle cx="50" cy="62" r="1.4" fill="#ffffff" opacity="0.45"/>
  <circle cx="66" cy="68" r="2" fill="#ffffff" opacity="0.55"/>
  <circle cx="70" cy="62" r="1.4" fill="#ffffff" opacity="0.45"/>
  <!-- Smirk with fangs -->
  <path d="M48,86 Q60,94 72,86" stroke="#5a0e18" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <polygon points="52,86 54,92 56,86" fill="#ffffff"/>
  <polygon points="64,86 66,92 68,86" fill="#ffffff"/>
</svg>
