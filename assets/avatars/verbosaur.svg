<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Verbosaur — chatty cartoon dinosaur. -->
  <!-- Back spikes (small zigzag plates) -->
  <polygon points="20,42 26,30 32,42" fill="#3aa8b8"/>
  <polygon points="34,32 42,18 50,32" fill="#3aa8b8"/>
  <polygon points="52,26 60,12 68,26" fill="#3aa8b8"/>
  <polygon points="70,28 78,16 86,28" fill="#3aa8b8"/>
  <polygon points="88,38 96,28 102,40" fill="#3aa8b8"/>
  <!-- Body -->
  <ellipse cx="60" cy="68" rx="44" ry="34" fill="#6dd6c8"/>
  <!-- Belly -->
  <ellipse cx="60" cy="78" rx="28" ry="18" fill="#c9efe9"/>
  <!-- Belly stripes -->
  <path d="M46,72 L46,86" stroke="#9fd8d0" stroke-width="2" stroke-linecap="round"/>
  <path d="M60,72 L60,90" stroke="#9fd8d0" stroke-width="2" stroke-linecap="round"/>
  <path d="M74,72 L74,86" stroke="#9fd8d0" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyes (big & friendly) -->
  <ellipse cx="46" cy="58" rx="9" ry="10" fill="#ffffff"/>
  <ellipse cx="74" cy="58" rx="9" ry="10" fill="#ffffff"/>
  <circle cx="46" cy="60" r="4.6" fill="#1a1a2e"/>
  <circle cx="74" cy="60" r="4.6" fill="#1a1a2e"/>
  <circle cx="48" cy="58" r="1.7" fill="#ffffff"/>
  <circle cx="76" cy="58" r="1.7" fill="#ffffff"/>
  <!-- Nostrils -->
  <ellipse cx="56" cy="80" rx="1.6" ry="2" fill="#3a8076"/>
  <ellipse cx="64" cy="80" rx="1.6" ry="2" fill="#3a8076"/>
  <!-- Mouth (open with two little teeth) -->
  <path d="M46,86 Q60,98 74,86 Q60,92 46,86 Z" fill="#5a2030"/>
  <polygon points="52,86 54,92 56,86" fill="#ffffff"/>
  <polygon points="64,86 66,92 68,86" fill="#ffffff"/>
  <!-- Cheeks -->
  <circle cx="34" cy="70" r="4" fill="#ff8faa" opacity="0.55"/>
  <circle cx="86" cy="70" r="4" fill="#ff8faa" opacity="0.55"/>
</svg>
